version: "3.8"

services:
  attesting:
    build: .
    ports:
      - "${ATTESTING_PORT:-3000}:${ATTESTING_PORT:-3000}"
    volumes:
      - attesting-data:/root/.attesting
      - ./config:/app/config:ro
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    restart: unless-stopped

volumes:
  attesting-data:
